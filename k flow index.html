// ─── Firebase + localStorage hybrid ───
const FIRESTORE_DOC = db.collection('appData').doc('main');
let _firestoreReady = false;
let _onFirestoreData = null; // callback set by App component

function loadData(){
  try{
    const d=localStorage.getItem(STORAGE_KEY);
    if(!d)return defaultData();
    const parsed=JSON.parse(d);
    if(!parsed.prospecting)parsed.prospecting=[];
    if(!parsed.prospectingGoal)parsed.prospectingGoal=50;
    return parsed;
  }catch(e){return defaultData()}
}

function saveData(d){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
    localStorage.setItem(STORAGE_KEY+'_lastSaved',new Date().toISOString());
  }catch(e){}
  // Save to Firestore (cloud) so all devices stay in sync
  FIRESTORE_DOC.set({json:JSON.stringify(d),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(err=>console.warn('Firestore save failed:',err));
}

// Real-time listener — fires whenever ANY device saves
let _skipNextSnapshot = false;
FIRESTORE_DOC.onSnapshot(snap=>{
  if(!snap.exists) return;
  if(_skipNextSnapshot){_skipNextSnapshot=false;return;}
  try{
    const d=JSON.parse(snap.data().json);
    if(!d.prospecting)d.prospecting=[];
    if(!d.prospectingGoal)d.prospectingGoal=50;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
    localStorage.setItem(STORAGE_KEY+'_lastSaved',new Date().toISOString());
    if(_onFirestoreData) _onFirestoreData(d);
  }catch(e){}
});

// ─── ScoreRing ───
function ScoreRing({value,max=100,size=100,label,subtitle}){
  const pct=max>0?Math.min(value/max*100,100):0;
  const r=40,c=2*Math.PI*r;
  const offset=c-(pct/100)*c;
  const color=pct>70?'#059669':pct>40?'#d97706':'#dc2626';
  const sz=size;
  return(
    <div className="flex flex-col items-center">
      <svg width={sz} height={sz} viewBox="0 0 100 100" className="transform -rotate-90">
        <circle cx="50" cy="50" r={r} fill="none" stroke="#e5e7eb" strokeWidth="8"/>
        <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={offset} style={{'--target':offset}} className="ring-animate transition-all duration-700"/>
      </svg>
      <div className="absolute flex flex-col items-center justify-center" style={{width:sz,height:sz}}>
        <span className="text-xl font-bold" style={{color}}>{Math.round(pct)}%</span>
      </div>
      {label&&<span className="text-xs font-semibold text-gray-700 mt-1">{label}</span>}
      {subtitle&&<span className="text-xs text-gray-500">{subtitle}</span>}
    </div>
  );
}

// ─── Today's Tasks ───
function TodaysTasks({data,setData}){
  const [date,setDate]=useState(today());
  const shiftDate=(days)=>{const d=new Date(date);d.setDate(d.getDate()+days);setDate(isoDate(d))};

  const clientTasks=useMemo(()=>{
    return data.clients.map(c=>{
      const tasks=c.tasks.filter(t=>t.date===date);
      const overdue=c.tasks.filter(t=>t.date<date&&t.status!=='Completed');
      return {client:c,tasks,overdue};
    }).filter(ct=>ct.tasks.length>0||ct.overdue.length>0);
  },[data,date]);

  const allTasks=clientTasks.flatMap(ct=>[...ct.tasks,...(date===today()?ct.overdue:[])]);
  const done=allTasks.filter(t=>t.status==='Completed').length;
  const total=allTasks.length;
  const pct=total?Math.round(done/total*100):0;

  const toggleTask=(clientId,taskId)=>{
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>{
        if(c.id!==clientId)return c;
        const tasks=c.tasks.map(t=>{
          if(t.id!==taskId)return t;
          const newStatus=t.status==='Completed'?'Pending':'Completed';
          return{...t,status:newStatus,completedAt:newStatus==='Completed'?new Date().toISOString():null};
        });
        const task=tasks.find(t=>t.id===taskId);
        let activities=[...c.activities];
        if(task.status==='Completed'){
          activities.push({id:uid(),taskId:task.id,date:new Date().toISOString(),text:`Completed: ${task.title}`,autoGenerated:true,createdAt:new Date().toISOString()});
        }
        return{...c,tasks,activities};
      })};
      saveData(nd);return nd;
    });
  };

  return(
    <div className="fade-in">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
        <h2 className="text-2xl font-bold text-brand-dark">Today's Tasks</h2>
        <div className="flex items-center gap-2">
          <button onClick={()=>shiftDate(-1)} className="touch-target w-10 h-10 rounded-lg bg-white shadow hover:shadow-md flex items-center justify-center text-lg">←</button>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="touch-target px-3 py-2 rounded-lg border bg-white shadow text-sm"/>
          <button onClick={()=>shiftDate(1)} className="touch-target w-10 h-10 rounded-lg bg-white shadow hover:shadow-md flex items-center justify-center text-lg">→</button>
          <button onClick={()=>setDate(today())} className="touch-target px-3 py-2 bg-brand text-white rounded-lg text-sm hover:bg-brand-hover">Today</button>
        </div>
      </div>

      <div className="glass rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-medium text-gray-700">Daily Progress</span>
          <span className="text-sm font-bold text-brand">{done}/{total} tasks</span>
        </div>
        <div className="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
          <div className="h-full bg-brand rounded-full transition-all duration-500" style={{width:`${pct}%`}}/>
        </div>
      </div>

      {clientTasks.length===0&&<div className="glass rounded-xl p-8 text-center text-gray-500">No tasks scheduled for this date.</div>}

      {clientTasks.map(({client:c,tasks,overdue})=>(
        <div key={c.id} className="glass rounded-xl p-4 mb-4">
          <h3 className="font-bold text-brand-dark mb-3 flex items-center gap-2">
            <div className="w-8 h-8 rounded-full bg-brand/20 flex items-center justify-center text-brand font-bold text-sm">{c.name.charAt(0)}</div>
            {c.name}
          </h3>
          {date===today()&&overdue.length>0&&(
            <div className="mb-3">
              <p className="text-xs font-semibold text-red-600 mb-1">⚠ Overdue</p>
              {overdue.map(t=>(
                <label key={t.id} className="touch-target flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-red-50 cursor-pointer border-l-2 border-red-400 mb-1">
                  <input type="checkbox" checked={t.status==='Completed'} onChange={()=>toggleTask(c.id,t.id)} className="w-5 h-5 accent-brand flex-shrink-0"/>
                  <div className="flex-1 min-w-0">
                    <span className={`text-sm ${t.status==='Completed'?'line-through text-gray-400':'text-red-700'}`}>{t.title}</span>
                    <span className="text-xs text-red-400 ml-2">Due {fmt(t.date)}</span>
                  </div>
                  <PhaseBadge phase={t.phase}/>
                </label>
              ))}
            </div>
          )}
          {tasks.map(t=>(
            <label key={t.id} className="touch-target flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-brand-light/50 cursor-pointer mb-1">
              <input type="checkbox" checked={t.status==='Completed'} onChange={()=>toggleTask(c.id,t.id)} className="w-5 h-5 accent-brand flex-shrink-0"/>
              <span className={`flex-1 text-sm ${t.status==='Completed'?'line-through text-gray-400':''}`}>{t.title}</span>
              <PhaseBadge phase={t.phase}/>
            </label>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── Client Dashboard ───
function ClientDashboard({client,setData}){
  const c=client;
  const tasks=c.tasks;
  const inProgress=tasks.filter(t=>t.status==='In Progress').length;
  const overdue=tasks.filter(t=>t.date<today()&&t.status!=='Completed').length;
  const completed=tasks.filter(t=>t.status==='Completed').length;
  const total=tasks.length;
  const implPct=total?Math.round(completed/total*100):0;

  const phaseData=PHASES.map(p=>{
    const pts=tasks.filter(t=>t.phase===p);
    const done=pts.filter(t=>t.status==='Completed').length;
    return{phase:p,total:pts.length,done,pct:pts.length?Math.round(done/pts.length*100):0};
  }).filter(p=>p.total>0);

  const upcoming=tasks.filter(t=>t.status!=='Completed'&&t.date>=today()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const recent=c.activities.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);

  return(
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-brand-dark mb-1">{c.name}</h2>
      <p className="text-sm text-gray-500 mb-6">{c.primaryCategory} — {c.city}, {c.state}</p>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
        <div className="glass rounded-xl p-4 flex flex-col items-center relative">
          <ScoreRing value={c.scores.gbpHealth.current} size={80} label="GBP Health" subtitle={`→${c.scores.gbpHealth.projected}%`}/>
        </div>
        <div className="glass rounded-xl p-4 flex flex-col items-center relative">
          <ScoreRing value={c.scores.landingPage.current} size={80} label="Landing Page"/>
        </div>
        <div className="glass rounded-xl p-4 flex flex-col items-center relative">
          <ScoreRing value={c.scores.core30.current} max={c.scores.core30.total||1} size={80} label="Core 30" subtitle={`${c.scores.core30.current}/${c.scores.core30.total}`}/>
        </div>
        <div className="glass rounded-xl p-4 flex flex-col items-center relative">
          <ScoreRing value={implPct} size={80} label="Implementation"/>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-3 mb-6">
        <div className="glass rounded-xl p-3 text-center">
          <p className="text-2xl font-bold text-yellow-600">{inProgress}</p>
          <p className="text-xs text-gray-500">In Progress</p>
        </div>
        <div className="glass rounded-xl p-3 text-center">
          <p className="text-2xl font-bold text-red-600">{overdue}</p>
          <p className="text-xs text-gray-500">Overdue</p>
        </div>
        <div className="glass rounded-xl p-3 text-center">
          <p className="text-2xl font-bold text-green-600">{completed}</p>
          <p className="text-xs text-gray-500">Completed</p>
        </div>
      </div>

      <div className="glass rounded-xl p-4 mb-6">
        <h3 className="font-bold text-brand-dark mb-3">Phase Progress</h3>
        {phaseData.map(p=>(
          <div key={p.phase} className="mb-3 last:mb-0">
            <div className="flex items-center justify-between mb-1">
              <PhaseBadge phase={p.phase}/>
              <span className="text-xs text-gray-500">{p.done}/{p.total}</span>
            </div>
            <div className="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all duration-500" style={{width:`${p.pct}%`,backgroundColor:PHASE_COLORS[p.phase]}}/>
            </div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="glass rounded-xl p-4">
          <h3 className="font-bold text-brand-dark mb-3">Upcoming Tasks</h3>
          {upcoming.length===0&&<p className="text-sm text-gray-400">No upcoming tasks</p>}
          {upcoming.map(t=>(
            <div key={t.id} className="flex items-center gap-2 py-2 border-b last:border-0">
              <PhaseBadge phase={t.phase}/>
              <span className="flex-1 text-sm truncate">{t.title}</span>
              <span className="text-xs text-gray-400">{fmt(t.date)}</span>
            </div>
          ))}

          <h3 className="font-bold text-brand-dark mb-3">Recent Activity</h3>
          {recent.length===0&&<p className="text-sm text-gray-400">No activity yet</p>}

            <div key={a.id} className="py-2 border-b last:border-0">

              </div>
              <span className="text-xs text-gray-400">{fmt(a.createdAt)}</span>
            </div>
          ))}

  );
}

// ─── Tasks Tab ───
function TasksTab({client,setData}){
  const [filter,setFilter]=useState('All');
  const [phaseFilter,setPhaseFilter]=useState('All');
  const [modalOpen,setModalOpen]=useState(false);
  const [editTask,setEditTask]=useState(null);
  const [form,setForm]=useState({title:'',description:'',phase:'Pre-work',date:today(),status:'Pending'});

  const tasks=useMemo(()=>{
    let t=[...client.tasks];
    if(filter!=='All')t=t.filter(x=>x.status===filter);
    if(phaseFilter!=='All')t=t.filter(x=>x.phase===phaseFilter);
    return t.sort((a,b)=>a.date.localeCompare(b.date));
  },[client.tasks,filter,phaseFilter]);

  const openAdd=()=>{setEditTask(null);setForm({title:'',description:'',phase:'Pre-work',date:today(),status:'Pending'});setModalOpen(true)};
  const openEdit=(t)=>{setEditTask(t);setForm({title:t.title,description:t.description||'',phase:t.phase,date:t.date,status:t.status});setModalOpen(true)};

  const saveTask=()=>{
    if(!form.title.trim())return;
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>{
        if(c.id!==client.id)return c;
        let tasks,activities=[...c.activities];
        if(editTask){
          tasks=c.tasks.map(t=>t.id===editTask.id?{...t,...form,completedAt:form.status==='Completed'&&!t.completedAt?new Date().toISOString():t.completedAt}:t);
        }else{
          const newT={id:Date.now(),date:form.date,title:form.title,description:form.description,phase:form.phase,status:form.status,createdAt:new Date().toISOString(),completedAt:null};
          tasks=[...c.tasks,newT];
          activities.push({id:uid(),taskId:newT.id,date:new Date().toISOString(),text:`Task added: ${newT.title}`,autoGenerated:true,createdAt:new Date().toISOString()});
        }
        return{...c,tasks,activities};
      })};
      saveData(nd);return nd;
    });
    setModalOpen(false);
  };

  const toggleTask=(taskId)=>{
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>{
        if(c.id!==client.id)return c;
        const tasks=c.tasks.map(t=>{
          if(t.id!==taskId)return t;
          const ns=t.status==='Completed'?'Pending':'Completed';
          return{...t,status:ns,completedAt:ns==='Completed'?new Date().toISOString():null};
        });
        const task=tasks.find(t=>t.id===taskId);
        let activities=[...c.activities];
        if(task.status==='Completed'){activities.push({id:uid(),taskId:task.id,date:new Date().toISOString(),text:`Completed: ${task.title}`,autoGenerated:true,createdAt:new Date().toISOString()})}
        return{...c,tasks,activities};
      })};
      saveData(nd);return nd;
    });
  };

  const deleteTask=(taskId)=>{
    if(!confirm('Delete this task?'))return;
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>{
        if(c.id!==client.id)return c;
        return{...c,tasks:c.tasks.filter(t=>t.id!==taskId)};
      })};
      saveData(nd);return nd;
    });
  };

  const statusButtons=['All','Pending','In Progress','Completed'];

  return(
    <div className="fade-in">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
        <h3 className="text-xl font-bold text-brand-dark">Tasks</h3>
        <button onClick={openAdd} className="touch-target px-4 py-2 bg-brand text-white rounded-lg hover:bg-brand-hover text-sm font-medium">+ Add Task</button>
      </div>

      <div className="flex flex-wrap gap-2 mb-4">
        {statusButtons.map(s=>(
          <button key={s} onClick={()=>setFilter(s)} className={`touch-target px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${filter===s?'bg-brand text-white':'bg-white text-gray-600 hover:bg-gray-100'}`}>{s}</button>
        ))}
        <select value={phaseFilter} onChange={e=>setPhaseFilter(e.target.value)} className="touch-target px-3 py-1.5 rounded-full text-sm bg-white border">
          <option>All</option>
          {PHASES.map(p=><option key={p}>{p}</option>)}
        </select>
      </div>

      <div className="space-y-2">
        {tasks.map(t=>(
          <div key={t.id} className={`glass rounded-xl p-3 flex items-center gap-3 ${t.date<today()&&t.status!=='Completed'?'border-l-4 border-red-400':''}`}>
            <input type="checkbox" checked={t.status==='Completed'} onChange={()=>toggleTask(t.id)} className="w-5 h-5 accent-brand flex-shrink-0"/>
            <div className="flex-1 min-w-0" onClick={()=>openEdit(t)}>
              <p className={`text-sm font-medium ${t.status==='Completed'?'line-through text-gray-400':''} cursor-pointer`}>{t.title}</p>
              <div className="flex items-center gap-2 mt-1 flex-wrap">
                <PhaseBadge phase={t.phase}/>
                <span className="text-xs text-gray-400">{fmt(t.date)}</span>
                <span className={`text-xs px-1.5 py-0.5 rounded ${t.status==='Completed'?'bg-green-100 text-green-700':t.status==='In Progress'?'bg-yellow-100 text-yellow-700':'bg-gray-100 text-gray-600'}`}>{t.status}</span>
              </div>
            </div>
            <button onClick={()=>deleteTask(t.id)} className="touch-target w-8 h-8 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg flex-shrink-0">✕</button>
          </div>
        ))}
        {tasks.length===0&&<div className="glass rounded-xl p-8 text-center text-gray-500">No tasks match your filters.</div>}
      </div>

      <Modal open={modalOpen} onClose={()=>setModalOpen(false)} title={editTask?'Edit Task':'Add Task'}>
        <div className="space-y-3">
          <div><label className="text-sm font-medium text-gray-700">Title</label><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} className="touch-target w-full mt-1 px-3 py-2 border rounded-lg" placeholder="Task title"/></div>
          <div><label className="text-sm font-medium text-gray-700">Description</label><textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} className="w-full mt-1 px-3 py-2 border rounded-lg" rows="2"/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-sm font-medium text-gray-700">Phase</label><select value={form.phase} onChange={e=>setForm(p=>({...p,phase:e.target.value}))} className="touch-target w-full mt-1 px-3 py-2 border rounded-lg">{PHASES.map(p=><option key={p}>{p}</option>)}</select></div>
            <div><label className="text-sm font-medium text-gray-700">Date</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} className="touch-target w-full mt-1 px-3 py-2 border rounded-lg"/></div>
          </div>
          <div><label className="text-sm font-medium text-gray-700">Status</label><select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))} className="touch-target w-full mt-1 px-3 py-2 border rounded-lg"><option>Pending</option><option>In Progress</option><option>Completed</option></select></div>
          <button onClick={saveTask} className="touch-target w-full py-2.5 bg-brand text-white rounded-lg hover:bg-brand-hover font-medium">{editTask?'Update Task':'Add Task'}</button>
        </div>
      </Modal>
    </div>
  );
}

// ─── Activity Log ───
function ActivityLog({client,setData}){
  const [text,setText]=useState('');
  const activities=useMemo(()=>[...client.activities].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)),[client.activities]);

  const addEntry=()=>{
    if(!text.trim())return;
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>{
        if(c.id!==client.id)return c;
        return{...c,activities:[...c.activities,{id:uid(),taskId:'',date:new Date().toISOString(),text:text.trim(),autoGenerated:false,createdAt:new Date().toISOString()}]};
      })};
      saveData(nd);return nd;
    });
    setText('');
  };

  return(
    <div className="fade-in">
      <h3 className="text-xl font-bold text-brand-dark mb-4">Activity Log</h3>
      <div className="flex gap-2 mb-4">
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addEntry()} placeholder="Add a manual entry..." className="touch-target flex-1 px-3 py-2 border rounded-lg"/>
        <button onClick={addEntry} className="touch-target px-4 py-2 bg-brand text-white rounded-lg hover:bg-brand-hover text-sm">Add</button>
      </div>
      <div className="space-y-2">
        {activities.map(a=>(
          <div key={a.id} className="glass rounded-xl p-3 flex items-start gap-3">
            <div className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${a.autoGenerated?'bg-blue-400':'bg-brand'}`}/>
            <div className="flex-1">
              <p className="text-sm">{a.text}</p>
              <div className="flex items-center gap-2 mt-1">
                <span className="text-xs text-gray-400">{fmt(a.createdAt)}</span>
                {a.autoGenerated&&<span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full">Auto-logged</span>}
              </div>
            </div>
          </div>
        ))}
        {activities.length===0&&<div className="glass rounded-xl p-8 text-center text-gray-500">No activity recorded yet.</div>}
      </div>
    </div>
  );
}

// ─── Settings Tab ───
function SettingsTab({client,setData}){
  const update=(field,value)=>{
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>c.id===client.id?{...c,[field]:value}:c)};
      saveData(nd);return nd;
    });
  };
  const updateScore=(path,value)=>{
    setData(prev=>{
      const nd={...prev,clients:prev.clients.map(c=>{
        if(c.id!==client.id)return c;
        const scores={...c.scores};
        const parts=path.split('.');
        if(parts.length===2){
          scores[parts[0]]={...scores[parts[0]],[parts[1]]:Number(value)||0};
        }
        return{...c,scores};
      })};
      saveData(nd);return nd;
    });
  };
  const exportClient=()=>{
    const blob=new Blob([JSON.stringify(client,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${client.name.replace(/\s+/g,'-').toLowerCase()}-export.json`;a.click();
  };
  const deleteClient=()=>{
    if(!confirm(`Delete ${client.name}? This cannot be undone.`))return;
    setData(prev=>{
      const nd={...prev,clients:prev.clients.filter(c=>c.id!==client.id)};
      saveData(nd);return nd;
    });
  };

  const Field=({label,field,type='text'})=>(
    <div>
      <label className="text-sm font-medium text-gray-700">{label}</label>
      <input type={type} value={client[field]||''} onChange={e=>update(field,e.target.value)} className="touch-target w-full mt-1 px-3 py-2 border rounded-lg"/>
    </div>
  );

  return(
    <div className="fade-in">
      <h3 className="text-xl font-bold text-brand-dark mb-4">Client Settings</h3>

// ─── Prospecting Tracker ───
const OUTREACH_CHANNELS=[
  {key:'cold_sms',label:'Cold SMS',icon:'💬',color:'#6366f1'},
  {key:'cold_calling',label:'Cold Calling',icon:'📞',color:'#059669'},
  {key:'email',label:'Email',icon:'📧',color:'#d97706'},
  {key:'in_person',label:'In-Person',icon:'🤝',color:'#dc2626'},
  {key:'facebook',label:'Facebook',icon:'📘',color:'#2563eb'}
];

function ProspectingTracker({data,setData}){
  const [channel,setChannel]=useState(OUTREACH_CHANNELS[0].key);
  const [outreaches,setOutreaches]=useState('');
  const [responses,setResponses]=useState('');
  const [meetings,setMeetings]=useState('');
  const [notes,setNotes]=useState('');
  const [period,setPeriod]=useState('today');
  const [goalEdit,setGoalEdit]=useState(false);
  const [goalVal,setGoalVal]=useState(data.prospectingGoal||50);

  const prospecting=data.prospecting||[];
  const goal=data.prospectingGoal||50;

  // Period helpers
  const now=new Date();
  const todayStr=today();
  const weekStart=(()=>{const d=new Date(now);d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10)})();
  const monthStart=now.toISOString().slice(0,8)+'01';

  const filterByPeriod=(entries,p)=>{
    if(p==='today')return entries.filter(e=>e.date===todayStr);
    if(p==='week')return entries.filter(e=>e.date>=weekStart);
    if(p==='month')return entries.filter(e=>e.date>=monthStart);
    return entries;
  };

  const todayEntries=prospecting.filter(e=>e.date===todayStr);
  const periodEntries=filterByPeriod(prospecting,period);

  // Stats calculator
  const calcStats=(entries)=>{
    const totalOut=entries.reduce((s,e)=>s+(e.outreaches||0),0);
    const totalResp=entries.reduce((s,e)=>s+(e.responses||0),0);
    const totalMeet=entries.reduce((s,e)=>s+(e.meetings||0),0);
    const respRate=totalOut>0?(totalResp/totalOut*100):0;
    const bookRate=totalOut>0?(totalMeet/totalOut*100):0;
    return{totalOut,totalResp,totalMeet,respRate,bookRate};
  };

  const todayStats=calcStats(todayEntries);
  const periodStats=calcStats(periodEntries);

  // Streak calculation
  const streak=(()=>{
    let count=0;
    let checkDate=new Date(now);
    // If today has no entries yet, start from yesterday
    const todayTotal=todayEntries.reduce((s,e)=>s+(e.outreaches||0),0);
    if(todayTotal<goal)checkDate.setDate(checkDate.getDate()-1);
    while(true){
      const ds=checkDate.toISOString().slice(0,10);
      const dayTotal=prospecting.filter(e=>e.date===ds).reduce((s,e)=>s+(e.outreaches||0),0);
      if(dayTotal>=goal)count++;
      else break;
      checkDate.setDate(checkDate.getDate()-1);
    }
    // Add today if met goal
    if(todayTotal>=goal)count++;
    return count;
  })();

  // Goal progress
  const todayTotal=todayEntries.reduce((s,e)=>s+(e.outreaches||0),0);
  const goalPct=Math.min(todayTotal/goal*100,100);

  const rateColor=(val,greenThresh,yellowThresh)=>val>=greenThresh?'text-green-500':val>=yellowThresh?'text-yellow-500':'text-red-500';

  const logEntry=()=>{
    const o=Number(outreaches)||0;
    if(o===0)return;
    const entry={id:uid(),date:todayStr,channel,outreaches:o,responses:Number(responses)||0,meetings:Number(meetings)||0,notes:notes.trim(),createdAt:new Date().toISOString()};
    setData(prev=>{
      const nd={...prev,prospecting:[...(prev.prospecting||[]),entry]};
      saveData(nd);return nd;
    });
    setOutreaches('');setResponses('');setMeetings('');setNotes('');
  };

  const saveGoal=()=>{
    const g=Number(goalVal)||50;
    setData(prev=>{const nd={...prev,prospectingGoal:g};saveData(nd);return nd});
    setGoalEdit(false);
  };

  // Channel breakdown (all time)
  const channelBreakdown=OUTREACH_CHANNELS.map(ch=>{
    const entries=prospecting.filter(e=>e.channel===ch.key);
    const stats=calcStats(entries);
    return{...ch,...stats};
  }).sort((a,b)=>b.totalOut-a.totalOut);

  // Today grouped by channel
  const todayByChannel=OUTREACH_CHANNELS.map(ch=>{
    const entries=todayEntries.filter(e=>e.channel===ch.key);
    if(entries.length===0)return null;
    return{...ch,entries,stats:calcStats(entries)};
  }).filter(Boolean);

  return(
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-brand-dark mb-6 flex items-center gap-2">🎯 Prospecting Tracker</h2>

      {/* Today's Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
        <div className="glass rounded-xl p-4 text-center">
          <p className="text-3xl font-bold text-brand-dark">{todayStats.totalOut}</p>
          <p className="text-xs text-gray-500 mt-1">Outreaches Today</p>
        </div>
        <div className="glass rounded-xl p-4 text-center">
          <p className={`text-3xl font-bold ${rateColor(todayStats.respRate,15,5)}`}>{todayStats.respRate.toFixed(1)}%</p>
          <p className="text-xs text-gray-500 mt-1">Response Rate</p>
        </div>
        <div className="glass rounded-xl p-4 text-center">
          <p className="text-3xl font-bold text-brand-dark">{todayStats.totalMeet}</p>
          <p className="text-xs text-gray-500 mt-1">Meetings Booked</p>
        </div>
        <div className="glass rounded-xl p-4 text-center">
          <p className={`text-3xl font-bold ${rateColor(todayStats.bookRate,5,2)}`}>{todayStats.bookRate.toFixed(1)}%</p>
          <p className="text-xs text-gray-500 mt-1">Booking Rate</p>
        </div>
      </div>

      {/* Daily Goal + Streak */}
      <div className="glass rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2">
            <span className="text-sm font-medium text-gray-700">Daily Goal</span>
            {!goalEdit&&<button onClick={()=>{setGoalVal(goal);setGoalEdit(true)}} className="text-xs text-brand hover:underline">Edit</button>}
          </div>
          <div className="flex items-center gap-3">
            {streak>0&&<span className="text-sm font-bold text-orange-500">🔥 {streak} day streak!</span>}
            {goalEdit?(
              <div className="flex items-center gap-1">
                <input type="number" value={goalVal} onChange={e=>setGoalVal(e.target.value)} className="w-16 px-2 py-1 border rounded text-sm text-center"/>
                <button onClick={saveGoal} className="px-2 py-1 bg-brand text-white rounded text-xs">Save</button>
                <button onClick={()=>setGoalEdit(false)} className="px-2 py-1 bg-gray-200 rounded text-xs">Cancel</button>
              </div>
            ):(
              <span className="text-sm font-bold text-brand">{todayTotal}/{goal}</span>
            )}
          </div>
        </div>
        <div className="w-full h-4 bg-gray-200 rounded-full overflow-hidden">
          <div className="h-full rounded-full transition-all duration-700" style={{width:`${goalPct}%`,background:goalPct>=100?'#059669':'#C45A30'}}/>
        </div>
        {goalPct>=100&&<p className="text-xs text-green-600 font-semibold mt-1 text-center">Goal reached! Keep going!</p>}
      </div>

      {/* Activity Logger */}
      <div className="glass rounded-xl p-4 mb-6">
        <h3 className="font-bold text-brand-dark mb-3">Log Outreach</h3>
        <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 mb-3">
          {OUTREACH_CHANNELS.map(ch=>(
            <button key={ch.key} onClick={()=>setChannel(ch.key)}
              className={`touch-target flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${channel===ch.key?'text-white shadow':'bg-white text-gray-600 hover:bg-gray-100'}`}
              style={channel===ch.key?{backgroundColor:ch.color}:{}}>
              <span>{ch.icon}</span><span className="hidden sm:inline">{ch.label}</span>
            </button>
          ))}
        </div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
          <input type="number" value={outreaches} onChange={e=>setOutreaches(e.target.value)} placeholder="Outreaches" className="touch-target px-3 py-2 border rounded-lg text-sm"/>
          <input type="number" value={responses} onChange={e=>setResponses(e.target.value)} placeholder="Responses" className="touch-target px-3 py-2 border rounded-lg text-sm"/>
          <input type="number" value={meetings} onChange={e=>setMeetings(e.target.value)} placeholder="Meetings" className="touch-target px-3 py-2 border rounded-lg text-sm"/>
          <input value={notes} onChange={e=>setNotes(e.target.value)} onKeyDown={e=>e.key==='Enter'&&logEntry()} placeholder="Notes (optional)" className="touch-target px-3 py-2 border rounded-lg text-sm"/>
        </div>
        <button onClick={logEntry} className="touch-target w-full sm:w-auto px-6 py-2.5 bg-brand text-white rounded-lg hover:bg-brand-hover text-sm font-medium">Log Activity</button>
      </div>

      {/* Today's Activity by Channel */}
      {todayByChannel.length>0&&(
        <div className="glass rounded-xl p-4 mb-6">
          <h3 className="font-bold text-brand-dark mb-3">Today's Activity</h3>
          <div className="space-y-3">
            {todayByChannel.map(ch=>(
              <div key={ch.key}>
                <div className="flex items-center gap-2 mb-1">
                  <span>{ch.icon}</span>
                  <span className="text-sm font-semibold" style={{color:ch.color}}>{ch.label}</span>
                  <span className="text-xs text-gray-400">— {ch.stats.totalOut} out, {ch.stats.totalResp} resp, {ch.stats.totalMeet} mtg</span>
                </div>
                {ch.entries.map(e=>(
                  <div key={e.id} className="ml-7 py-1 text-sm text-gray-600 border-l-2 pl-3 mb-1" style={{borderColor:ch.color}}>
                    {e.outreaches} outreaches, {e.responses} responses, {e.meetings} meetings
                    {e.notes&&<span className="text-gray-400"> — {e.notes}</span>}
                    <span className="text-xs text-gray-400 ml-2">{new Date(e.createdAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Period Toggle Stats */}
      <div className="glass rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-brand-dark">Period Stats</h3>
          <div className="flex gap-1">
            {[{k:'week',l:'This Week'},{k:'month',l:'This Month'},{k:'all',l:'All Time'}].map(p=>(
              <button key={p.k} onClick={()=>setPeriod(p.k)}
                className={`touch-target px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${period===p.k?'bg-brand text-white':'bg-white text-gray-600 hover:bg-gray-100'}`}>
                {p.l}
              </button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
          <div className="bg-brand-light rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-brand-dark">{periodStats.totalOut}</p>
            <p className="text-xs text-gray-500">Outreaches</p>
          </div>
          <div className="bg-brand-light rounded-lg p-3 text-center">
            <p className={`text-2xl font-bold ${rateColor(periodStats.respRate,15,5)}`}>{periodStats.respRate.toFixed(1)}%</p>
            <p className="text-xs text-gray-500">Response Rate</p>
          </div>
          <div className="bg-brand-light rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-brand-dark">{periodStats.totalMeet}</p>
            <p className="text-xs text-gray-500">Meetings</p>
          </div>
          <div className="bg-brand-light rounded-lg p-3 text-center">
            <p className={`text-2xl font-bold ${rateColor(periodStats.bookRate,5,2)}`}>{periodStats.bookRate.toFixed(1)}%</p>
            <p className="text-xs text-gray-500">Booking Rate</p>
          </div>
        </div>
      </div>

      {/* Channel Breakdown Table */}
      <div className="glass rounded-xl p-4">
        <h3 className="font-bold text-brand-dark mb-3">Channel Breakdown (All Time)</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b text-left">
              <th className="py-2">Channel</th>
              <th className="py-2 text-right">Outreaches</th>
              <th className="py-2 text-right">Responses</th>
              <th className="py-2 text-right">Resp %</th>
              <th className="py-2 text-right">Meetings</th>
              <th className="py-2 text-right">Book %</th>

                  <td className={`py-2 text-right font-medium ${rateColor(ch.respRate,15,5)}`}>{ch.respRate.toFixed(1)}%</td>

function AnalyticsTab({client,setData}){
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const mobileResult=client.pageSpeed?.mobile||null;
  const desktopResult=client.pageSpeed?.desktop||null;
  const lastRun=client.pageSpeed?.lastRun||null;

  const getUrl=()=>{
    let url=client.website||'';
    if(!url)return '';
    if(!url.startsWith('http'))url='https://'+url;
    return url;
  };

  const runTest=async()=>{
    const url=getUrl();
    if(!url){setError('No website URL set for this client. Add one in Settings.');return;}
    setLoading(true);setError('');
    try{
      const [mobileRes,desktopRes]=await Promise.all([
        fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&strategy=mobile`).then(r=>r.json()),
        fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&strategy=desktop`).then(r=>r.json())
      ]);
      if(mobileRes.error){throw new Error(mobileRes.error.message||'API error');}
      const extractData=(res)=>{
        const lh=res.lighthouseResult||{};
        const cats=lh.categories||{};
        const audits=lh.audits||{};
        const perf=cats.performance||{};
        // Core Web Vitals
        const lcp=audits['largest-contentful-paint']?.numericValue/1000||0;
        const inp=audits['interaction-to-next-paint']?.numericValue||audits['max-potential-fid']?.numericValue||0;
        const cls=audits['cumulative-layout-shift']?.numericValue||0;
        // Opportunities
        const opps=Object.values(audits).filter(a=>a.score!==null&&a.score<1&&a.details&&a.details.type==='opportunity').slice(0,8).map(a=>({title:a.title,description:a.description,savings:a.details?.overallSavingsMs||0}));
        return{score:Math.round((perf.score||0)*100),lcp,inp,cls,opportunities:opps};
      };
      const mobile=extractData(mobileRes);
      const desktop=extractData(desktopRes);
      setData(prev=>{
        const nd={...prev,clients:prev.clients.map(c=>{
          if(c.id!==client.id)return c;
          return{...c,pageSpeed:{mobile,desktop,lastRun:new Date().toISOString()}};
        })};
        saveData(nd);return nd;
      });
    }catch(e){
      setError('Speed test failed: '+(e.message||'Unknown error'));
    }finally{setLoading(false)}
  };

  const ScoreCircle=({score,label})=>{
    const color=score>=90?'#059669':score>=50?'#d97706':'#dc2626';
    const r=40;const c=2*Math.PI*r;const offset=c-(score/100)*c;
    return(
      <div className="flex flex-col items-center">
        <svg width={120} height={120} viewBox="0 0 100 100" className="transform -rotate-90">
          <circle cx="50" cy="50" r={r} fill="none" stroke="#e5e7eb" strokeWidth="8"/>
          <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round"
            strokeDasharray={c} strokeDashoffset={offset} className="ring-animate transition-all duration-700"/>
        </svg>
        <div className="absolute flex flex-col items-center justify-center" style={{width:120,height:120}}>
          <span className="text-2xl font-bold" style={{color}}>{score}</span>
        </div>
        <span className="text-sm font-semibold text-gray-700 mt-1">{label}</span>
      </div>
    );
  };

  const vitalColor=(metric,val)=>{
    if(metric==='lcp')return val<2.5?'text-green-600':val<4?'text-yellow-600':'text-red-600';
    if(metric==='inp')return val<200?'text-green-600':val<500?'text-yellow-600':'text-red-600';
    if(metric==='cls')return val<0.1?'text-green-600':val<0.25?'text-yellow-600':'text-red-600';
    return'text-gray-600';
  };
  const vitalBg=(metric,val)=>{
    if(metric==='lcp')return val<2.5?'bg-green-50':val<4?'bg-yellow-50':'bg-red-50';
    if(metric==='inp')return val<200?'bg-green-50':val<500?'bg-yellow-50':'bg-red-50';
    if(metric==='cls')return val<0.1?'bg-green-50':val<0.25?'bg-yellow-50':'bg-red-50';
    return'bg-gray-50';
  };

  return(
    <div className="fade-in">
      <h3 className="text-xl font-bold text-brand-dark mb-6 flex items-center gap-2">🌐 Website Analytics</h3>

      {/* Page Speed Section */}
      <div className="glass rounded-xl p-4 mb-6">
        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
          <div>
            <h4 className="font-bold text-brand-dark">Page Speed Insights</h4>
            {lastRun&&<p className="text-xs text-gray-400">Last run: {fmt(lastRun)}</p>}
            {getUrl()&&<p className="text-xs text-gray-500 mt-0.5">{getUrl()}</p>}
          </div>
          <button onClick={runTest} disabled={loading}
            className={`touch-target px-5 py-2.5 rounded-lg text-sm font-medium transition-colors ${loading?'bg-gray-300 text-gray-500 cursor-wait':'bg-brand text-white hover:bg-brand-hover'}`}>
            {loading?'Running Test...':'Run Speed Test'}
          </button>
        </div>

        {error&&<div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4">{error}</div>}

        {(mobileResult||desktopResult)?(
          <>
            {/* Score Circles */}
            <div className="flex justify-center gap-12 mb-6">
              {mobileResult&&<div className="relative"><ScoreCircle score={mobileResult.score} label="Mobile"/></div>}
              {desktopResult&&<div className="relative"><ScoreCircle score={desktopResult.score} label="Desktop"/></div>}
            </div>

            {/* Core Web Vitals */}
            <h4 className="font-semibold text-brand-dark mb-3">Core Web Vitals</h4>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
              {['mobile','desktop'].map(strat=>{
                const res=strat==='mobile'?mobileResult:desktopResult;
                if(!res)return null;
                return(
                  <div key={strat} className="space-y-2">
                    <p className="text-sm font-medium text-gray-600 capitalize">{strat}</p>
                    <div className={`rounded-lg p-3 ${vitalBg('lcp',res.lcp)}`}>
                      <div className="flex justify-between items-center">
                        <span className="text-sm text-gray-700">LCP</span>
                        <span className={`text-lg font-bold ${vitalColor('lcp',res.lcp)}`}>{res.lcp.toFixed(2)}s</span>
                      </div>
                    </div>
                    <div className={`rounded-lg p-3 ${vitalBg('inp',res.inp)}`}>
                      <div className="flex justify-between items-center">
                        <span className="text-sm text-gray-700">INP/FID</span>
                        <span className={`text-lg font-bold ${vitalColor('inp',res.inp)}`}>{Math.round(res.inp)}ms</span>
                      </div>
                    </div>
                    <div className={`rounded-lg p-3 ${vitalBg('cls',res.cls)}`}>
                      <div className="flex justify-between items-center">
                        <span className="text-sm text-gray-700">CLS</span>
                        <span className={`text-lg font-bold ${vitalColor('cls',res.cls)}`}>{res.cls.toFixed(3)}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Opportunities */}
            {mobileResult.opportunities&&mobileResult.opportunities.length>0&&(
              <div className="mb-6">
                <h4 className="font-semibold text-brand-dark mb-3">Top Opportunities (Mobile)</h4>
                <div className="space-y-2">
                  {mobileResult.opportunities.map((o,i)=>(
                    <div key={i} className="bg-amber-50 rounded-lg p-3">
                      <p className="text-sm font-medium text-gray-800">{o.title}</p>
                      {o.savings>0&&<p className="text-xs text-amber-700 mt-0.5">Potential savings: ~{(o.savings/1000).toFixed(1)}s</p>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        ):(
          <div className="text-center py-8 text-gray-400">
            <p className="text-4xl mb-2">🚀</p>
            <p className="text-sm">Run a speed test to see your performance scores and Core Web Vitals.</p>
          </div>
        )}
      </div>

      {/* GSC Placeholder */}
      <div className="glass rounded-xl p-4">
        <div className="flex items-center justify-between mb-4">
          <h4 className="font-bold text-brand-dark">Google Search Console</h4>
          <span className="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-full font-medium">Coming Soon</span>
        </div>
        <div className="bg-gray-50 rounded-lg p-6 border-2 border-dashed border-gray-200 text-center mb-4">
          <p className="text-3xl mb-2">📊</p>
          <p className="text-sm font-medium text-gray-700 mb-1">Connect Google Search Console</p>
          <p className="text-xs text-gray-500 mb-3">View clicks, impressions, CTR, and keyword rankings directly inside KailenFlow.</p>
          <button disabled className="touch-target px-5 py-2.5 bg-gray-300 text-gray-500 rounded-lg text-sm font-medium cursor-not-allowed">Connect GSC Account</button>
        </div>

        {/* Mock stat cards */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4 opacity-40">
          <div className="bg-blue-50 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-blue-600">—</p>
            <p className="text-xs text-gray-500">Total Clicks</p>
          </div>
          <div className="bg-purple-50 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-purple-600">—</p>
            <p className="text-xs text-gray-500">Impressions</p>
          </div>
          <div className="bg-green-50 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-green-600">—</p>
            <p className="text-xs text-gray-500">Avg CTR</p>
          </div>
          <div className="bg-amber-50 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-amber-600">—</p>
            <p className="text-xs text-gray-500">Avg Position</p>
          </div>
        </div>

        {/* Mock tables */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 opacity-40">
          <div className="bg-gray-50 rounded-lg p-4">
            <h5 className="text-sm font-semibold text-gray-600 mb-2">Top Pages</h5>
            <div className="space-y-2">
              {[1,2,3].map(i=><div key={i} className="h-4 bg-gray-200 rounded w-full"/>)}
            </div>
          </div>
          <div className="bg-gray-50 rounded-lg p-4">
            <h5 className="text-sm font-semibold text-gray-600 mb-2">Top Queries</h5>
            <div className="space-y-2">
              {[1,2,3].map(i=><div key={i} className="h-4 bg-gray-200 rounded w-full"/>)}
            </div>
          </div>
        </div>
        <p className="text-xs text-gray-400 text-center mt-3">GSC integration coming soon — data will appear here once connected.</p>
      </div>
    </div>
  );
}

// ─── Main App ───
function App(){
  const [data,setData]=useState(loadData);
  const [activeClient,setActiveClient]=useState(data.clients[0]?.id||'');
  const [view,setView]=useState('today');
  const [tab,setTab]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [addModalOpen,setAddModalOpen]=useState(false);
  const [newClientName,setNewClientName]=useState('');

  // Auto-save to cloud whenever data changes
  const isFirstRender = useRef(true);
  useEffect(()=>{
    if(isFirstRender.current){isFirstRender.current=false;return;}
    _skipNextSnapshot=true;
    saveData(data);
  },[data]);

  // Listen for real-time updates from other devices
  useEffect(()=>{
    _onFirestoreData=(newData)=>{
      setData(newData);
      isFirstRender.current=true; // prevent echo save
    };
    // On first load, try to pull from Firestore
    FIRESTORE_DOC.get().then(snap=>{
      if(snap.exists){
        try{
          const d=JSON.parse(snap.data().json);
          setData(d);
          isFirstRender.current=true;
          localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
        }catch(e){}
      } else {
        // First time ever — push current local data to cloud
        saveData(data);
      }
    }).catch(()=>{});
    return()=>{_onFirestoreData=null};
  },[]);

  const client=data.clients.find(c=>c.id===activeClient);

  const addClient=()=>{
    if(!newClientName.trim())return;
    const nc={id:uid(),name:newClientName.trim(),website:'',gbpUrl:'',phone:'',address:'',city:'',state:'',primaryCategory:'',notes:'',createdAt:new Date().toISOString(),
      scores:{gbpHealth:{current:0,projected:0},landingPage:{current:0},core30:{current:0,total:0}},rankData:[],activities:[],tasks:[]};
    setData(prev=>{const nd={...prev,clients:[...prev.clients,nc]};saveData(nd);return nd});
    setActiveClient(nc.id);setView('dashboard');setTab('settings');setAddModalOpen(false);setNewClientName('');
  };

  const tabs=[
    {key:'dashboard',label:'Dashboard',icon:'📊'},
    {key:'tasks',label:'Tasks',icon:'✓'},
    {key:'activity',label:'Activity',icon:'📝'},
    {key:'rankings',label:'Rankings',icon:'📈'},
    {key:'analytics',label:'Analytics',icon:'🌐'},
    {key:'settings',label:'Settings',icon:'⚙'},
    {key:'reports',label:'Reports',icon:'📄'}
  ];

  // Correct activeClient if deleted
  useEffect(()=>{
    if(!data.clients.find(c=>c.id===activeClient)&&data.clients.length>0){
      setActiveClient(data.clients[0].id);
    }
  },[data.clients,activeClient]);

  return(
    <div className="flex min-h-screen">
      <Sidebar clients={data.clients} activeClient={activeClient} setActiveClient={setActiveClient}
        view={view} setView={setView} onAddClient={()=>setAddModalOpen(true)}
        data={data} setData={setData} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}/>

      <main className="flex-1 lg:ml-[260px] min-h-screen pb-20 lg:pb-6">
        {/* Mobile header */}
        <div className="no-print sticky top-0 z-30 lg:hidden bg-brand-warm/95 backdrop-blur border-b px-4 py-3 flex items-center gap-3">
          <button onClick={()=>setSidebarOpen(true)} className="touch-target w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white/50">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1C1E" strokeWidth="2" strokeLinecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <h1 className="text-lg font-bold text-brand-dark truncate">KailenFlow Suite</h1>
        </div>

        <div className="p-4 sm:p-6 max-w-6xl mx-auto">
          {view==='today'&&<TodaysTasks data={data} setData={setData}/>}
          {view==='overview'&&<AllClientsOverview data={data} setActiveClient={setActiveClient} setView={()=>setView('dashboard')}/>}
          {view==='prospecting'&&<ProspectingTracker data={data} setData={setData}/>}
          {view==='reports'&&<ReportsTab data={data}/>}
          {view==='dashboard'&&client&&(
            <>
              {/* Tab bar */}
              <div className="no-print flex gap-1 mb-6 overflow-x-auto pb-1 -mx-4 px-4 sm:mx-0 sm:px-0">
                {tabs.map(t=>(
                  <button key={t.key} onClick={()=>setTab(t.key)}
                    className={`touch-target flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-colors ${tab===t.key?'bg-brand text-white shadow':'bg-white text-gray-600 hover:bg-gray-100'}`}>
                    <span className="hidden sm:inline">{t.icon}</span>{t.label}
                  </button>
                ))}
              </div>
              {tab==='dashboard'&&<ClientDashboard client={client} setData={setData}/>}
              {tab==='tasks'&&<TasksTab client={client} setData={setData}/>}
              {tab==='activity'&&<ActivityLog client={client} setData={setData}/>}
              {tab==='rankings'&&<RankingsTab client={client} setData={setData}/>}
              {tab==='analytics'&&<AnalyticsTab client={client} setData={setData}/>}
              {tab==='settings'&&<SettingsTab client={client} setData={setData}/>}
              {tab==='reports'&&<ReportsTab data={data}/>}
            </>
          )}
        </div>

        {/* Mobile bottom nav */}
        <div className="no-print fixed bottom-0 left-0 right-0 lg:hidden bg-white border-t shadow-lg z-30">
          <div className="flex">
            {[{key:'today',icon:'📋',label:'Today'},{key:'dashboard',icon:'📊',label:'Client'},{key:'prospecting',icon:'🎯',label:'Prospect'},{key:'overview',icon:'👥',label:'All'},{key:'reports',icon:'📄',label:'Reports'}].map(n=>(
              <button key={n.key} onClick={()=>{setView(n.key);if(n.key==='dashboard'&&!client&&data.clients[0])setActiveClient(data.clients[0].id)}}
                className={`flex-1 flex flex-col items-center py-2 text-xs ${view===n.key?'text-brand font-bold':'text-gray-500'}`}>
                <span className="text-lg">{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        </div>
      </main>

      <Modal open={addModalOpen} onClose={()=>setAddModalOpen(false)} title="Add New Client">
        <div className="space-y-3">
          <input value={newClientName} onChange={e=>setNewClientName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addClient()}
            placeholder="Client name" className="touch-target w-full px-3 py-2 border rounded-lg" autoFocus/>
          <button onClick={addClient} className="touch-target w-full py-2.5 bg-brand text-white rounded-lg hover:bg-brand-hover font-medium">Add Client</button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
